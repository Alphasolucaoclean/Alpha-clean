<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alpha Clean - Meu Cashback</title>
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --border: #e2e8f0;
            --gold: #c9a84c;
            --gold-bg: #fef9e7;
            --blue: #2563eb;
            --blue-bg: #eff6ff;
            --blue-dark: #1e40af;
            --green: #16a34a;
            --red: #ef4444;
            --red-bg: #fef2f2;
            --text: #1e293b;
            --text-secondary: #64748b;
            --shadow: 0 1px 3px rgba(0,0,0,0.06);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 16px;
            background-image: radial-gradient(circle at 10% 20%, rgba(37,99,235,0.03) 0%, transparent 50%);
        }

        .container { width: 100%; max-width: 430px; }

        .header { text-align: center; padding: 20px 0 10px; }
        .logo-container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 14px;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-bottom: 6px;
        }
        .logo-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--blue), var(--blue-dark));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: 900;
            color: #fff;
        }
        .logo-text .brand { font-size: 18px; font-weight: 700; letter-spacing: 2px; color: var(--blue-dark); }
        .logo-text .brand span { color: var(--gold); }
        .logo-text .sub { font-size: 9px; letter-spacing: 3px; color: var(--text-secondary); }
        .welcome-tag { font-size: 12px; color: var(--green); letter-spacing: 2px; font-weight: 600; }

        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 18px;
            margin-bottom: 12px;
            box-shadow: var(--shadow);
        }

        .login-box { text-align: center; }
        .login-box h3 { font-size: 17px; margin-bottom: 4px; color: var(--blue-dark); }
        .login-box p { font-size: 13px; color: var(--text-secondary); margin-bottom: 14px; }
        .code-input {
            font-size: 26px !important;
            text-align: center;
            letter-spacing: 10px;
            font-weight: 700;
            padding: 14px !important;
        }

        .cashback-big {
            text-align: center;
            padding: 18px;
            background: var(--gold-bg);
            border-radius: 14px;
            border: 1px solid rgba(201,168,76,0.2);
        }
        .cashback-big .amount {
            font-size: 48px;
            font-weight: 700;
            color: #b8860b;
        }
        .cashback-big .label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8b6914;
            font-weight: 600;
        }
        .badge {
            display: inline-block;
            background: var(--gold);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            font-weight: 700;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 12px;
            font-weight: 700;
        }

        .oferta-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 8px;
            position: relative;
        }
        .oferta-card.destaque {
            border-color: var(--gold);
            background: var(--gold-bg);
        }
        .oferta-card .oferta-titulo { font-size: 15px; font-weight: 700; margin-bottom: 3px; }
        .oferta-card .oferta-desc { font-size: 12px; color: var(--text-secondary); margin-bottom: 6px; }
        .oferta-card .oferta-preco { font-size: 20px; font-weight: 700; color: var(--green); }
        .oferta-card .oferta-badge {
            position: absolute;
            top: -8px;
            right: 10px;
            background: var(--red);
            color: #fff;
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 9px;
            font-weight: 700;
        }
        .btn-whatsapp-oferta {
            display: inline-block;
            background: #25D366;
            color: #fff;
            padding: 8px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-decoration: none;
            margin-top: 6px;
        }

        .transaction {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            font-size: 12px;
            gap: 8px;
        }
        .transaction:last-child { border-bottom: none; }
        .transaction .desc strong { display: block; font-size: 13px; }
        .transaction .desc span { color: var(--text-secondary); font-size: 10px; }
        .transaction .amount {
            font-weight: 700;
            white-space: nowrap;
            padding: 3px 8px;
            border-radius: 6px;
        }
        .amount.credit { color: #b8860b; background: var(--gold-bg); }
        .amount.debit { color: var(--red); background: var(--red-bg); }
        .amount.service { color: var(--blue); background: var(--blue-bg); }

        .empty-state { text-align: center; padding: 20px; color: var(--text-secondary); font-size: 13px; }

        .form-group { margin-bottom: 12px; }
        label {
            display: block;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-secondary);
            margin-bottom: 5px;
            font-weight: 600;
        }
        input {
            width: 100%;
            background: #f8fafc;
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
        }

        .btn {
            padding: 12px 18px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            border: none;
            width: 100%;
            transition: all .2s;
        }
        .btn-primary { background: var(--blue); color: #fff; }

        .toast {
            position: fixed;
            bottom: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--red);
            color: #fff;
            padding: 10px 20px;
            border-radius: 25px;
            font-weight: 600;
            font-size: 13px;
            z-index: 200;
            opacity: 0;
            transition: opacity .3s;
            pointer-events: none;
        }
        .toast.show { opacity: 1; }

        .hidden { display: none !important; }
        .logout-link {
            text-align: center;
            margin-top: 10px;
            font-size: 11px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        .info-box {
            background: var(--blue-bg);
            border-radius: 10px;
            padding: 12px;
            text-align: center;
            font-size: 12px;
            color: var(--blue-dark);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-container">
                <div class="logo-icon">A</div>
                <div class="logo-text">
                    <div class="brand">ALPHA <span>CLEAN</span></div>
                    <div class="sub">Programa de Fidelidade</div>
                </div>
            </div>
        </div>

        <div id="login-screen">
            <div class="card">
                <div class="login-box">
                    <h3>🔐 Acesse seu Cashback</h3>
                    <p>Digite o código de acesso</p>
                    <div class="form-group">
                        <input type="text" id="codigoInput" class="code-input" placeholder="000000" maxlength="6" inputmode="numeric">
                    </div>
                    <button class="btn btn-primary" onclick="verificarCodigo()">✨ Entrar</button>
                </div>
            </div>
        </div>

        <div id="cliente-screen" class="hidden">
            <div class="welcome-tag" style="text-align:center;margin-bottom:8px;">👤 <span id="clienteNome"></span></div>
            
            <div class="card">
                <div class="cashback-big">
                    <div class="amount" id="saldoDisplay">R$ 0,00</div>
                    <div class="label">Saldo Cashback <span class="badge">10%</span></div>
                    <div style="font-size:10px;color:var(--text-secondary);margin-top:3px;">Use como desconto no próximo serviço</div>
                </div>
            </div>

            <div class="card">
                <div class="info-box">💰 A cada serviço, <strong>10%</strong> volta como cashback!</div>
            </div>

            <div class="card" id="ofertasCard">
                <div class="section-title">🎯 Ofertas Especiais</div>
                <div id="ofertasContainer"><div class="empty-state">Carregando...</div></div>
            </div>

            <div class="card">
                <div class="section-title">📋 Histórico</div>
                <div id="historicoCliente"><div class="empty-state">Nenhuma transação</div></div>
            </div>

            <p class="logout-link" onclick="logout()">🔒 Sair</p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_KEY = '$2a$10$4L9JW3FJilcxJxYzakIlaeAKtcCqrLoQWP4mGAmN81OaT3ih4M9Ey';
        const CLIENTES_BIN_ID = '69f51701aaba8821975ec0e9';
        const OFERTAS_BIN_ID = '69f5173436566621a814f088';
        const CONFIG_BIN_ID = '69f51754856a68218996c653';

        let clienteAtual = null;

        async function loadCliente(id) {
            const resp = await fetch(`https://api.jsonbin.io/v3/b/${CLIENTES_BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await resp.json();
            return data.record.find(c => c.id === id) || null;
        }

        async function loadOfertas() {
            const resp = await fetch(`https://api.jsonbin.io/v3/b/${OFERTAS_BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await resp.json();
            return data.record.filter(o => o.ativa && o.titulo !== 'Bem-vindo!');
        }

        async function loadConfig() {
            const resp = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG_BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await resp.json();
            return data.record;
        }

        async function init() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            const codigo = params.get('codigo');

            if (id && codigo) {
                const cliente = await loadCliente(id);
                if (cliente && cliente.codigoAcesso === codigo) {
                    clienteAtual = cliente;
                    mostrarPainel();
                    return;
                }
            }
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('cliente-screen').classList.add('hidden');
        }

        async function verificarCodigo() {
            const codigo = document.getElementById('codigoInput').value.trim();
            if (!codigo) return showToast('Digite o código');

            const resp = await fetch(`https://api.jsonbin.io/v3/b/${CLIENTES_BIN_ID}/latest`, {
                headers: { 'X-Master-Key': API_KEY }
            });
            const data = await resp.json();
            const cliente = data.record.find(c => c.codigoAcesso === codigo);

            if (cliente) {
                clienteAtual = cliente;
                mostrarPainel();
                const newUrl = window.location.origin + window.location.pathname + `?id=${cliente.id}&codigo=${cliente.codigoAcesso}`;
                window.history.pushState({}, '', newUrl);
            } else {
                showToast('Código inválido');
            }
        }

        document.getElementById('codigoInput').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') verificarCodigo();
        });

        function mostrarPainel() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('cliente-screen').classList.remove('hidden');
            document.getElementById('clienteNome').textContent = clienteAtual.nome;
            atualizarTela();
        }

        async function atualizarTela() {
            document.getElementById('saldoDisplay').textContent = 'R$ ' + clienteAtual.saldoCashback.toFixed(2).replace('.', ',');
            renderHistorico();
            await renderOfertas();
        }

        function renderHistorico() {
            const container = document.getElementById('historicoCliente');
            const transacoes = clienteAtual.transacoes || [];
            if (transacoes.length === 0) {
                container.innerHTML = '<div class="empty-state">Nenhuma transação</div>';
                return;
            }
            const reversed = [...transacoes].reverse();
            container.innerHTML = reversed.map(t => {
                let classe = 'service';
                let sinal = '';
                if (t.tipo === 'cashback_ganho') { classe = 'credit'; sinal = '+'; }
                else if (t.tipo === 'cashback_usado') { classe = 'debit'; sinal = '-'; }
                const data = new Date(t.data).toLocaleDateString('pt-BR', { day:'2-digit', month:'2-digit', year:'2-digit' });
                return `<div class="transaction">
                    <div class="desc"><strong>${t.descricao}</strong><span>${data}</span></div>
                    <div class="amount ${classe}">${sinal} R$ ${t.valor.toFixed(2)}</div>
                </div>`;
            }).join('');
        }

        async function renderOfertas() {
            const container = document.getElementById('ofertasContainer');
            const config = await loadConfig();
            const ofertas = await loadOfertas();

            if (ofertas.length === 0) {
                container.innerHTML = '<div class="empty-state">Nenhuma oferta no momento</div>';
                return;
            }

            container.innerHTML = ofertas.map(o => {
                const destaqueClass = o.destaque ? ' destaque' : '';
                const badge = o.destaque ? '<span class="oferta-badge">⭐</span>' : '';
                const msg = encodeURIComponent(`Olá! Tenho interesse na oferta: ${o.titulo} - R$ ${o.preco.toFixed(2)}`);
                const whatsapp = config.telefoneEmpresa ? 
                    `<a href="https://wa.me/55${config.telefoneEmpresa.replace(/\D/g,'')}?text=${msg}" class="btn-whatsapp-oferta" target="_blank">💬 Quero essa oferta!</a>` : '';
                return `<div class="oferta-card${destaqueClass}">
                    ${badge}
                    <div class="oferta-titulo">${o.titulo}</div>
                    <div class="oferta-desc">${o.descricao}</div>
                    <div class="oferta-preco">R$ ${o.preco.toFixed(2)}</div>
                    ${whatsapp}
                </div>`;
            }).join('');
        }

        function logout() {
            clienteAtual = null;
            document.getElementById('login-screen').classList.remove('hidden');
            document.getElementById('cliente-screen').classList.add('hidden');
            document.getElementById('codigoInput').value = '';
            window.history.pushState({}, '', window.location.origin + window.location.pathname);
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        init();
    </script>
</body>
</html>
