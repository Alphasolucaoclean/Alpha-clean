<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitar Orçamento - Alpha Solução Clean</title>
    <style>
        :root {
            --gold: #c9a84c;
            --blue: #2563eb;
            --blue-dark: #1e40af;
            --green: #16a34a;
            --text: #1e293b;
            --text-secondary: #64748b;
            --card: #ffffff;
            --border: #e2e8f0;
            --shadow: 0 2px 8px rgba(0,0,0,0.06);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: #f8fafc; color: var(--text); padding: 16px; }
        .container { max-width: 500px; margin: 0 auto; }
        .header { text-align: center; padding: 20px 0; }
        .logo-alpha { font-size: 28px; font-weight: 900; letter-spacing: 4px; color: var(--blue-dark); }
        .logo-solucao { font-size: 13px; font-weight: 600; letter-spacing: 2px; color: var(--blue); }
        .card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; padding: 20px; margin-bottom: 14px;
            box-shadow: var(--shadow);
        }
        .card h2 { font-size: 16px; margin-bottom: 14px; color: var(--blue-dark); }
        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 4px; text-transform: uppercase; letter-spacing: 1px; }
        input, select, textarea {
            width: 100%; background: #f8fafc; border: 1px solid var(--border);
            padding: 12px; border-radius: 10px; font-size: 14px; font-family: inherit;
        }
        textarea { resize: vertical; min-height: 60px; }
        .service-select {
            display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 8px;
        }
        .service-option {
            padding: 12px; border: 2px solid var(--border); border-radius: 10px;
            text-align: center; cursor: pointer; transition: all .2s; font-size: 13px; font-weight: 600;
        }
        .service-option.selected { border-color: var(--blue); background: #eff6ff; color: var(--blue); }
        .btn {
            width: 100%; padding: 14px; border-radius: 12px; font-size: 15px;
            font-weight: 600; cursor: pointer; border: none; transition: all .2s;
        }
        .btn-whatsapp { background: #25D366; color: #fff; }
        .btn-outline { background: #fff; color: var(--blue); border: 1px solid var(--blue); margin-top: 8px; }
        .btn-voltar { display: inline-block; margin-top: 20px; color: var(--text-secondary); text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo-alpha">ALPHA</div>
            <div class="logo-solucao">SOLUÇÃO CLEAN</div>
            <p style="color:var(--text-secondary);font-size:12px;">Orçamento em até 10 minutos!</p>
        </div>

        <div class="card">
            <h2>📋 Qual serviço você precisa?</h2>
            <div class="service-select" id="serviceSelect">
                <div class="service-option" data-service="Higienização de Sofá">🛋️ Sofá</div>
                <div class="service-option" data-service="Higienização de Colchão">🛏️ Colchão</div>
                <div class="service-option" data-service="Higienização de Cadeira">🪑 Cadeira</div>
                <div class="service-option" data-service="Interior de Carro">🚗 Interior Carro</div>
                <div class="service-option" data-service="Lavagem Ecológica" style="grid-column:1/-1;">🌿 Lavagem Ecológica</div>
            </div>
            <div class="form-group">
                <label>Quantidade (sofás, cadeiras, etc.)</label>
                <input type="number" id="quantidade" placeholder="Ex: 2" min="1" value="1">
            </div>
            <div class="form-group">
                <label>Seu nome</label>
                <input type="text" id="nome" placeholder="Nome completo">
            </div>
            <div class="form-group">
                <label>Endereço (bairro e cidade)</label>
                <input type="text" id="endereco" placeholder="Bairro, Cidade">
            </div>
            <div class="form-group">
                <label>Observações (opcional)</label>
                <textarea id="obs" placeholder="Algum detalhe importante..."></textarea>
            </div>
            <button class="btn btn-whatsapp" onclick="enviarOrcamento()">💬 Solicitar Orçamento via WhatsApp</button>
        </div>

        <div class="card" style="text-align:center;">
            <h2>💰 Já é cliente?</h2>
            <p style="font-size:13px;color:var(--text-secondary);">Acesse seu cashback e histórico</p>
            <a href="cliente.html" class="btn btn-outline" style="display:inline-block;width:auto;text-decoration:none;">🔐 Acessar Conta</a>
        </div>

        <a href="index.html" class="btn-voltar">← Voltar ao site</a>
    </div>

    <script>
        const API_KEY = '$2a$10$4L9JW3FJilcxJxYzakIlaeAKtcCqrLoQWP4mGAmN81OaT3ih4M9Ey';
        const CONFIG_BIN_ID = '69f51754856a68218996c653';
        let servicoSelecionado = '';

        document.getElementById('serviceSelect').addEventListener('click', function(e) {
            if (e.target.classList.contains('service-option')) {
                document.querySelectorAll('.service-option').forEach(o => o.classList.remove('selected'));
                e.target.classList.add('selected');
                servicoSelecionado = e.target.dataset.service;
            }
        });

        async function enviarOrcamento() {
            if (!servicoSelecionado) { alert('Selecione um serviço'); return; }
            const nome = document.getElementById('nome').value.trim();
            const endereco = document.getElementById('endereco').value.trim();
            if (!nome) { alert('Informe seu nome'); return; }
            if (!endereco) { alert('Informe bairro e cidade'); return; }
            
            const qtd = document.getElementById('quantidade').value || 1;
            const obs = document.getElementById('obs').value.trim();
            let msg = `Olá! Gostaria de solicitar um orçamento:%0A%0A`;
            msg += `📋 Serviço: ${servicoSelecionado}%0A`;
            msg += `🔢 Quantidade: ${qtd}%0A`;
            msg += `👤 Nome: ${nome}%0A`;
            msg += `📍 Endereço: ${endereco}%0A`;
            if (obs) msg += `📝 Obs: ${obs}%0A`;
            msg += `%0A Aguardo seu retorno! 🧹✨`;

            try {
                const resp = await fetch(`https://api.jsonbin.io/v3/b/${CONFIG_BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await resp.json();
                const config = data.record;
                const telefone = config.telefoneEmpresa ? config.telefoneEmpresa.replace(/\D/g, '') : 'SEU_NUMERO';
                window.open(`https://wa.me/55${telefone}?text=${msg}`, '_blank');
            } catch(e) {
                window.open(`https://wa.me/552199057-9655?text=${msg}`, '_blank');
            }
        }
    </script>
</body>
</html>
